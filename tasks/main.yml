---
# tasks file for ansible-role-ssh-hardening
#
# Runs as root throughout. Root key is provisioned by Terraform.
# Root retains SSH access (key only) after hardening.
# sshd_config is deployed last — AllowGroups becomes active at that point.

# ---------------------------------------------------------------------------
# Group and root
# ---------------------------------------------------------------------------

- name: Ensure ssh group exists
  ansible.builtin.group:
    name: "{{ ssh_group }}"
    state: present

- name: Add root to ssh group
  ansible.builtin.user:
    name: root
    groups: "{{ ssh_group }}"
    append: yes

# ---------------------------------------------------------------------------
# fail2ban
# ---------------------------------------------------------------------------

- name: Install fail2ban
  ansible.builtin.apt:
    name: fail2ban
    state: present
    update_cache: yes
    cache_valid_time: 3600

- name: Configure fail2ban for sshd
  ansible.builtin.template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: "0644"
  notify: Enable and restart fail2ban

# ---------------------------------------------------------------------------
# Host keys — Ed25519 only
# ---------------------------------------------------------------------------

- name: Remove non-Ed25519 host keys
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/ssh/ssh_host_rsa_key
    - /etc/ssh/ssh_host_rsa_key.pub
    - /etc/ssh/ssh_host_ecdsa_key
    - /etc/ssh/ssh_host_ecdsa_key.pub
    - /etc/ssh/ssh_host_dsa_key
    - /etc/ssh/ssh_host_dsa_key.pub
  notify: Reload sshd

# ---------------------------------------------------------------------------
# sshd_config — deployed last
# Root is in ssh_group — SSH access is retained after AllowGroups is active.
# ---------------------------------------------------------------------------

- name: Deploy hardened sshd_config
  ansible.builtin.template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: "0600"
    validate: sshd -t -f %s
  notify: Reload sshd
